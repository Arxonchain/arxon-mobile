<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Depth Watch — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --abyss:#06262E;
    --deep:#0B4F6C;
    --cyan:#4FD8EB;
    --coral:#FF7B54;
    --seafoam:#7FE7C4;
    --sand:#F4E4C1;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background:var(--abyss);
    font-family:'Nunito',sans-serif;
    touch-action:none;
  }
  #wrap{
    position:relative; width:100vw; height:100vh;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(ellipse at 50% 0%, #0d5f7a 0%, #06262E 70%);
  }
  canvas{
    display:block;
    background:linear-gradient(180deg,#0d5f7a 0%, #0B4F6C 40%, #073644 100%);
    border-radius:0;
    touch-action:none;
  }
  #hud{
    position:absolute; top:0; left:0; right:0;
    padding:14px 16px 10px;
    display:flex; flex-direction:column; gap:8px;
    pointer-events:none;
    z-index:10;
  }
  #hudTop{ display:flex; justify-content:space-between; align-items:center; }
  .badge{
    font-family:'Fredoka',sans-serif; font-weight:600; font-size:14px;
    color:var(--sand); background:rgba(6,38,46,0.55);
    padding:6px 12px; border-radius:20px; letter-spacing:0.3px;
    border:1px solid rgba(244,228,193,0.15);
  }
  #tideWrap{
    width:100%; height:14px; border-radius:10px;
    background:rgba(6,38,46,0.55);
    border:1px solid rgba(244,228,193,0.15);
    overflow:hidden; position:relative;
  }
  #tideFill{
    height:100%; width:0%;
    background:linear-gradient(90deg, var(--seafoam), var(--coral));
    transition:width 0.08s linear;
    border-radius:10px;
  }
  #tideLabel{
    font-family:'Fredoka',sans-serif; font-size:10px; font-weight:600;
    color:var(--sand); opacity:0.85; letter-spacing:1.5px; text-transform:uppercase;
  }
  #centerMsg{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    text-align:center; z-index:20; pointer-events:none;
    font-family:'Fredoka',sans-serif; color:var(--sand);
  }
  #centerMsg h1{ font-size:28px; margin:0 0 6px; color:var(--seafoam); text-shadow:0 2px 12px rgba(0,0,0,0.5);}
  #centerMsg p{ font-size:14px; margin:0; opacity:0.9; font-family:'Nunito',sans-serif; font-weight:700;}
  #startBtn, #retryBtn{
    margin-top:16px; pointer-events:all; cursor:pointer;
    font-family:'Fredoka',sans-serif; font-weight:600; font-size:16px;
    background:var(--coral); color:#06262E; border:none;
    padding:12px 28px; border-radius:30px;
    box-shadow:0 4px 0 #c9563a, 0 6px 16px rgba(0,0,0,0.35);
  }
  #startBtn:active, #retryBtn:active{ transform:translateY(3px); box-shadow:0 1px 0 #c9563a;}
  #joystick{
    position:absolute; bottom:36px; left:36px; width:110px; height:110px;
    border-radius:50%; background:rgba(244,228,193,0.08);
    border:2px solid rgba(244,228,193,0.25); z-index:15;
    touch-action:none;
  }
  #stick{
    position:absolute; width:48px; height:48px; border-radius:50%;
    background:rgba(127,231,196,0.5); border:2px solid var(--seafoam);
    top:31px; left:31px; pointer-events:none;
  }
  #cloakBtn{
    position:absolute; bottom:50px; right:36px; width:78px; height:78px;
    border-radius:50%; background:rgba(79,216,235,0.15);
    border:2px solid var(--cyan); z-index:15;
    display:flex; align-items:center; justify-content:center;
    font-family:'Fredoka',sans-serif; font-size:11px; font-weight:600;
    color:var(--cyan); text-align:center; line-height:1.2;
    touch-action:none; user-select:none;
  }
  #cloakBtn.ready{ box-shadow:0 0 18px rgba(79,216,235,0.6);}
  #cloakBtn.cooling{ opacity:0.35; }
  .hidden{ display:none !important; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <div id="hud">
    <div id="hudTop">
      <div class="badge" id="levelBadge">DEPTH 1</div>
      <div class="badge" id="scoreBadge">00:00</div>
    </div>
    <div>
      <div id="tideLabel">Exposure</div>
      <div id="tideWrap"><div id="tideFill"></div></div>
    </div>
  </div>

  <div id="centerMsg">
    <h1>DEPTH WATCH</h1>
    <p>Stay out of the light. Reach the portal.</p>
    <button id="startBtn">DIVE IN</button>
  </div>

  <div id="joystick" class="hidden"><div id="stick"></div></div>
  <div id="cloakBtn" class="hidden ready">CLOAK<br>READY</div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('wrap');
  const tideFill = document.getElementById('tideFill');
  const levelBadge = document.getElementById('levelBadge');
  const scoreBadge = document.getElementById('scoreBadge');
  const centerMsg = document.getElementById('centerMsg');
  const startBtn = document.getElementById('startBtn');
  const joystick = document.getElementById('joystick');
  const stick = document.getElementById('stick');
  const cloakBtn = document.getElementById('cloakBtn');

  let W, H;
  function resize(){
    const maxW = Math.min(window.innerWidth, 480);
    const maxH = window.innerHeight;
    canvas.width = maxW; canvas.height = maxH;
    W = canvas.width; H = canvas.height;
  }
  resize();
  window.addEventListener('resize', resize);

  // ---------- Game State ----------
  let state = 'menu'; // menu, playing, caught, won-level, gameover
  let level = 1;
  let elapsed = 0;
  let lastTime = 0;

  const player = { x:0, y:0, r:14, speed:150, angle:0 };
  let obstacles = [];
  let enemies = [];
  let portal = { x:0, y:0, r:22 };
  let cloak = { active:false, timer:0, duration:2.6, cooldown:0, cooldownMax:9 };
  let exposure = 0; // 0..100
  const EXPOSURE_MAX = 100;
  const EXPOSURE_RATE = 42; // per second while lit
  const EXPOSURE_DECAY = 22; // per second while safe

  let bubbles = [];
  for(let i=0;i<28;i++){
    bubbles.push({x:Math.random(), y:Math.random(), r:1+Math.random()*2.5, spd:6+Math.random()*14});
  }

  // ---------- Input ----------
  let moveVec = {x:0,y:0};
  let joyActive = false;
  let joyCenter = {x:0,y:0};
  const keys = {};

  window.addEventListener('keydown', e=>{ keys[e.key.toLowerCase()]=true; });
  window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; });

  function updateKeyboardVec(){
    let x=0,y=0;
    if(keys['arrowleft']||keys['a']) x-=1;
    if(keys['arrowright']||keys['d']) x+=1;
    if(keys['arrowup']||keys['w']) y-=1;
    if(keys['arrowdown']||keys['s']) y+=1;
    if(!joyActive && (x!==0||y!==0)){
      const len = Math.hypot(x,y)||1;
      moveVec = {x:x/len, y:y/len};
    } else if(!joyActive){
      moveVec = {x:0,y:0};
    }
  }

  function joyRect(){ return joystick.getBoundingClientRect(); }

  joystick.addEventListener('touchstart', e=>{
    e.preventDefault();
    joyActive = true;
    const r = joyRect();
    joyCenter = { x:r.left+r.width/2, y:r.top+r.height/2 };
    handleJoyMove(e.touches[0]);
  }, {passive:false});
  joystick.addEventListener('touchmove', e=>{
    e.preventDefault();
    handleJoyMove(e.touches[0]);
  }, {passive:false});
  joystick.addEventListener('touchend', e=>{
    e.preventDefault();
    joyActive = false;
    moveVec = {x:0,y:0};
    stick.style.left = '31px'; stick.style.top = '31px';
  }, {passive:false});

  function handleJoyMove(touch){
    let dx = touch.clientX - joyCenter.x;
    let dy = touch.clientY - joyCenter.y;
    const maxR = 38;
    const dist = Math.hypot(dx,dy);
    if(dist>maxR){ dx = dx/dist*maxR; dy = dy/dist*maxR; }
    stick.style.left = (31+dx)+'px';
    stick.style.top = (31+dy)+'px';
    const len = Math.hypot(dx,dy)||1;
    moveVec = { x:dx/maxR, y:dy/maxR };
  }

  // Mouse fallback for desktop dragging joystick
  let mouseDown=false;
  joystick.addEventListener('mousedown', e=>{ mouseDown=true; joyActive=true; const r=joyRect(); joyCenter={x:r.left+r.width/2,y:r.top+r.height/2}; handleJoyMove(e); });
  window.addEventListener('mousemove', e=>{ if(mouseDown) handleJoyMove(e); });
  window.addEventListener('mouseup', ()=>{ mouseDown=false; joyActive=false; moveVec={x:0,y:0}; stick.style.left='31px'; stick.style.top='31px'; });

  cloakBtn.addEventListener('touchstart', e=>{ e.preventDefault(); tryCloak(); }, {passive:false});
  cloakBtn.addEventListener('mousedown', tryCloak);

  function tryCloak(){
    if(state!=='playing') return;
    if(cloak.cooldown<=0 && !cloak.active){
      cloak.active = true;
      cloak.timer = cloak.duration;
    }
  }

  // ---------- Level generation ----------
  function buildLevel(n){
    obstacles = [];
    enemies = [];
    exposure = 0;
    cloak = { active:false, timer:0, duration:2.6, cooldown:0, cooldownMax:Math.max(5, 9-n*0.3) };

    player.x = W*0.5; player.y = H*0.88;

    portal.x = W*0.5 + (Math.random()-0.5)*W*0.3;
    portal.y = H*0.10;

    // obstacles: scale count slightly with level
    const obsCount = 6 + Math.min(6, n);
    for(let i=0;i<obsCount;i++){
      const w = 40+Math.random()*50;
      const h = 30+Math.random()*40;
      const x = 20 + Math.random()*(W-40-w);
      const y = H*0.2 + Math.random()*(H*0.6-h);
      obstacles.push({x,y,w,h});
    }

    // enemies scale with level: count, speed, cone width
    const enemyCount = 2 + Math.floor(n*1.2);
    for(let i=0;i<enemyCount;i++){
      const type = Math.random()<0.5 ? 'watcher':'hunter';
      const x = 30 + Math.random()*(W-60);
      const y = H*0.15 + Math.random()*(H*0.65);
      enemies.push({
        type,
        x, y,
        baseAngle: Math.random()*Math.PI*2,
        angle: Math.random()*Math.PI*2,
        sweepSpeed: (type==='watcher') ? (0.6+n*0.08)*(Math.random()<0.5?1:-1) : (0.9+n*0.05),
        coneAngle: Math.max(0.35, 0.75 - n*0.02), // radians half-angle, gets narrower... actually keep moderate
        range: 130 + n*6,
        state:'idle', // hunter: idle/alert/chase
        alertTimer:0,
        px:x, py:y,
        speed: 40+n*4
      });
    }
  }

  // ---------- Geometry helpers ----------
  function circleRectCollide(cx,cy,cr, rect){
    const nx = Math.max(rect.x, Math.min(cx, rect.x+rect.w));
    const ny = Math.max(rect.y, Math.min(cy, rect.y+rect.h));
    const dx = cx-nx, dy = cy-ny;
    return (dx*dx+dy*dy) < cr*cr;
  }

  function segmentIntersectsRect(x1,y1,x2,y2, rect){
    // check if line from (x1,y1)-(x2,y2) intersects rect
    const lines = [
      [rect.x,rect.y,rect.x+rect.w,rect.y],
      [rect.x+rect.w,rect.y,rect.x+rect.w,rect.y+rect.h],
      [rect.x+rect.w,rect.y+rect.h,rect.x,rect.y+rect.h],
      [rect.x,rect.y+rect.h,rect.x,rect.y]
    ];
    for(const [x3,y3,x4,y4] of lines){
      if(segIntersect(x1,y1,x2,y2,x3,y3,x4,y4)) return true;
    }
    // also true if line starts inside rect
    if(x1>rect.x&&x1<rect.x+rect.w&&y1>rect.y&&y1<rect.y+rect.h) return true;
    return false;
  }
  function segIntersect(x1,y1,x2,y2,x3,y3,x4,y4){
    const d = (x1-x2)*(y3-y4)-(y1-y2)*(x3-x4);
    if(Math.abs(d)<1e-9) return false;
    const t = ((x1-x3)*(y3-y4)-(y1-y3)*(x3-x4))/d;
    const u = ((x1-x3)*(y1-y2)-(y1-y3)*(x1-x2))/d;
    return t>=0&&t<=1&&u>=0&&u<=1;
  }

  function hasLineOfSight(ex,ey,px,py){
    for(const o of obstacles){
      if(segmentIntersectsRect(ex,ey,px,py,o)) return false;
    }
    return true;
  }

  function angleDiff(a,b){
    let d = a-b;
    while(d>Math.PI) d-=Math.PI*2;
    while(d<-Math.PI) d+=Math.PI*2;
    return Math.abs(d);
  }

  // ---------- Update ----------
  function update(dt){
    updateKeyboardVec();
    elapsed += dt;
    scoreBadge.textContent = formatTime(elapsed);

    // cloak timers
    if(cloak.active){
      cloak.timer -= dt;
      if(cloak.timer<=0){ cloak.active=false; cloak.cooldown = cloak.cooldownMax; }
    } else if(cloak.cooldown>0){
      cloak.cooldown -= dt;
    }
    updateCloakUI();

    // player movement
    let mx = moveVec.x, my = moveVec.y;
    const len = Math.hypot(mx,my);
    if(len>0.05){
      mx/=len; my/=len;
      player.angle = Math.atan2(my,mx);
      const nx = player.x + mx*player.speed*dt;
      const ny = player.y + my*player.speed*dt;
      // collision with obstacles
      let blockedX=false, blockedY=false;
      for(const o of obstacles){
        if(circleRectCollide(nx, player.y, player.r, o)) blockedX=true;
        if(circleRectCollide(player.x, ny, player.r, o)) blockedY=true;
      }
      if(!blockedX) player.x = Math.max(player.r, Math.min(W-player.r, nx));
      if(!blockedY) player.y = Math.max(player.r, Math.min(H-player.r, ny));
    }

    // enemies
    let lit = false;
    for(const en of enemies){
      if(en.type==='watcher'){
        en.angle += en.sweepSpeed*dt*0.5;
      } else {
        // hunter: rotate slowly searching unless alert
        const dx = player.x-en.x, dy = player.y-en.y;
        const distToPlayer = Math.hypot(dx,dy);
        const targetAngle = Math.atan2(dy,dx);
        const canSee = distToPlayer < en.range && angleDiff(targetAngle, en.angle) < en.coneAngle && hasLineOfSight(en.x,en.y,player.x,player.y) && !cloak.active;
        if(canSee){
          en.state='chase';
          en.alertTimer = 1.4;
          en.angle = targetAngle;
          // move toward player
          en.x += Math.cos(targetAngle)*en.speed*dt;
          en.y += Math.sin(targetAngle)*en.speed*dt;
        } else {
          if(en.alertTimer>0){
            en.alertTimer -= dt;
            en.angle = targetAngle;
          } else {
            en.state='idle';
            en.angle += en.sweepSpeed*dt*0.35;
          }
        }
      }

      // detection check for exposure
      const dx = player.x-en.x, dy = player.y-en.y;
      const dist = Math.hypot(dx,dy);
      const angTo = Math.atan2(dy,dx);
      if(!cloak.active && dist < en.range && angleDiff(angTo, en.angle) < en.coneAngle && hasLineOfSight(en.x,en.y,player.x,player.y)){
        lit = true;
      }
    }

    if(lit){
      exposure = Math.min(EXPOSURE_MAX, exposure + EXPOSURE_RATE*dt);
    } else {
      exposure = Math.max(0, exposure - EXPOSURE_DECAY*dt);
    }
    tideFill.style.width = exposure+'%';

    if(exposure>=EXPOSURE_MAX){
      state='caught';
      showEnd(false);
      return;
    }

    // portal check
    const dP = Math.hypot(player.x-portal.x, player.y-portal.y);
    if(dP < portal.r+player.r-6){
      level += 1;
      buildLevel(level);
    }

    // bubbles
    for(const b of bubbles){
      b.y -= (b.spd*dt)/H;
      if(b.y<-0.02){ b.y=1.02; b.x=Math.random(); }
    }
  }

  function updateCloakUI(){
    if(cloak.active){
      cloakBtn.textContent = '';
      cloakBtn.innerHTML = 'CLOAKED';
      cloakBtn.classList.remove('cooling'); cloakBtn.classList.add('ready');
    } else if(cloak.cooldown>0){
      cloakBtn.innerHTML = Math.ceil(cloak.cooldown)+'s';
      cloakBtn.classList.add('cooling'); cloakBtn.classList.remove('ready');
    } else {
      cloakBtn.innerHTML = 'CLOAK<br>READY';
      cloakBtn.classList.remove('cooling'); cloakBtn.classList.add('ready');
    }
  }

  function formatTime(t){
    const m = Math.floor(t/60).toString().padStart(2,'0');
    const s = Math.floor(t%60).toString().padStart(2,'0');
    return m+':'+s;
  }

  // ---------- Draw ----------
  function draw(){
    ctx.clearRect(0,0,W,H);

    // background gradient water
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#0d5f7a');
    grad.addColorStop(0.45,'#0B4F6C');
    grad.addColorStop(1,'#052832');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    // light shafts
    ctx.save();
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = '#ffffff';
    for(let i=0;i<3;i++){
      ctx.beginPath();
      ctx.moveTo(W*(0.2+i*0.3), 0);
      ctx.lineTo(W*(0.2+i*0.3)+40, 0);
      ctx.lineTo(W*(0.2+i*0.3)-30, H);
      ctx.lineTo(W*(0.2+i*0.3)-90, H);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    // bubbles
    ctx.fillStyle = 'rgba(244,228,193,0.35)';
    for(const b of bubbles){
      ctx.beginPath();
      ctx.arc(b.x*W, b.y*H, b.r, 0, Math.PI*2);
      ctx.fill();
    }

    // portal
    const pulse = 4*Math.sin(elapsed*3);
    ctx.beginPath();
    ctx.arc(portal.x, portal.y, portal.r+pulse, 0, Math.PI*2);
    const pg = ctx.createRadialGradient(portal.x,portal.y,4,portal.x,portal.y,portal.r+pulse+10);
    pg.addColorStop(0, 'rgba(127,231,196,0.95)');
    pg.addColorStop(1, 'rgba(127,231,196,0)');
    ctx.fillStyle = pg;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(portal.x, portal.y, 10, 0, Math.PI*2);
    ctx.fillStyle = '#7FE7C4';
    ctx.fill();

    // obstacles (coral rocks)
    for(const o of obstacles){
      ctx.fillStyle = '#0a3f4d';
      roundRect(o.x,o.y,o.w,o.h,8);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,123,84,0.35)';
      ctx.lineWidth = 2;
      roundRect(o.x,o.y,o.w,o.h,8);
      ctx.stroke();
    }

    // enemy light cones (drawn before enemy body)
    for(const en of enemies){
      drawCone(en);
    }
    // enemy bodies
    for(const en of enemies){
      drawEnemy(en);
    }

    // player
    drawPlayer();
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function drawCone(en){
    const grad = ctx.createRadialGradient(en.x,en.y,4,en.x,en.y,en.range);
    const danger = en.state==='chase';
    grad.addColorStop(0, danger? 'rgba(255,123,84,0.55)' : 'rgba(255,209,102,0.4)');
    grad.addColorStop(1, 'rgba(255,123,84,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(en.x,en.y);
    ctx.arc(en.x, en.y, en.range, en.angle-en.coneAngle, en.angle+en.coneAngle);
    ctx.closePath();
    ctx.fill();
  }

  function drawEnemy(en){
    ctx.save();
    ctx.translate(en.x, en.y);
    // body
    ctx.beginPath();
    ctx.arc(0,0,12,0,Math.PI*2);
    ctx.fillStyle = en.state==='chase' ? '#FF7B54' : '#1b6e85';
    ctx.fill();
    ctx.strokeStyle = 'rgba(244,228,193,0.6)';
    ctx.lineWidth=2;
    ctx.stroke();
    // eye direction indicator
    ctx.rotate(en.angle);
    ctx.beginPath();
    ctx.arc(10,0,3,0,Math.PI*2);
    ctx.fillStyle = '#FFE1A8';
    ctx.fill();
    ctx.restore();
  }

  function drawPlayer(){
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.globalAlpha = cloak.active ? 0.4 : 1;
    // shell
    ctx.beginPath();
    ctx.arc(0,0,player.r,0,Math.PI*2);
    ctx.fillStyle = cloak.active ? 'rgba(79,216,235,0.8)' : '#7FE7C4';
    ctx.fill();
    ctx.strokeStyle = '#F4E4C1';
    ctx.lineWidth = 2;
    ctx.stroke();
    // direction nub
    ctx.rotate(player.angle);
    ctx.beginPath();
    ctx.arc(player.r-2,0,4,0,Math.PI*2);
    ctx.fillStyle = '#06262E';
    ctx.fill();
    ctx.restore();

    if(cloak.active){
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.r+8, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(79,216,235,0.6)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  // ---------- Loop ----------
  function loop(t){
    if(!lastTime) lastTime = t;
    const dt = Math.min(0.033, (t-lastTime)/1000);
    lastTime = t;
    if(state==='playing') update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function showEnd(won){
    joystick.classList.add('hidden');
    cloakBtn.classList.add('hidden');
    centerMsg.classList.remove('hidden');
    centerMsg.innerHTML = won ?
      `<h1>SURFACED</h1><p>You made it out clean.</p><button id="retryBtn">DIVE AGAIN</button>` :
      `<h1>SPOTTED</h1><p>Reached Depth ${level} · ${formatTime(elapsed)}</p><button id="retryBtn">TRY AGAIN</button>`;
    document.getElementById('retryBtn').addEventListener('click', startGame);
  }

  function startGame(){
    level = 1;
    elapsed = 0;
    lastTime = 0;
    buildLevel(level);
    state='playing';
    centerMsg.classList.add('hidden');
    joystick.classList.remove('hidden');
    cloakBtn.classList.remove('hidden');
  }

  levelBadge.textContent = 'DEPTH 1';
  setInterval(()=>{ levelBadge.textContent = 'DEPTH '+level; }, 200);

  startBtn.addEventListener('click', startGame);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
