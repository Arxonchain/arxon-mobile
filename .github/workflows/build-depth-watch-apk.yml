# Private Depth Watch test builds — NOT production OTA.
# Triggers only on feat/depth-watch-private (or manual dispatch).
# Bundles the web UI into the APK (no arxon-mobile.pages.dev) with the game enabled.

name: Build Depth Watch Test APK (Private)

on:
  workflow_dispatch:
  push:
    branches:
      - feat/depth-watch-private

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app (Depth Watch enabled)
        run: npm run build:depth-watch
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Sync Capacitor with local bundle
        run: npx cap sync android
        env:
          CAPACITOR_BUNDLE_LOCAL: 'true'

      - name: Add Firebase google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
            "android/app/build/outputs/apk/debug/Arxon-DepthWatch-test-${{ github.run_number }}.apk"

      - name: Upload test APK
        uses: actions/upload-artifact@v4
        with:
          name: arxon-depth-watch-test-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/Arxon-DepthWatch-test-${{ github.run_number }}.apk
          retention-days: 14
