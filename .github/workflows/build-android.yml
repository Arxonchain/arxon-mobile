name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Set App Icon
        run: |
          cp android/app/src/main/res/icon.png /tmp/icon_source.png
          convert /tmp/icon_source.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert /tmp/icon_source.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert /tmp/icon_source.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert /tmp/icon_source.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert /tmp/icon_source.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert /tmp/icon_source.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          convert /tmp/icon_source.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          convert /tmp/icon_source.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          convert /tmp/icon_source.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          convert /tmp/icon_source.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Arxon-Mining-App
          path: android/app/build/outputs/apk/debug/app-debug.apk