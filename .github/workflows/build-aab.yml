name: Build Android AAB

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Create keystore
        run: |
          keytool -genkeypair \
            -storetype JKS \
            -keystore android/app/arxon-release.keystore \
            -alias arxon \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass arxon2024 \
            -keypass arxon2024 \
            -dname "CN=Arxon,OU=Dev,O=Arxon,L=Lagos,S=Lagos,C=NG"
          echo "Keystore created"
          keytool -list -keystore android/app/arxon-release.keystore -storepass arxon2024

      - name: Build AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/arxon-release.keystore \
            -Pandroid.injected.signing.store.password=arxon2024 \
            -Pandroid.injected.signing.key.alias=arxon \
            -Pandroid.injected.signing.key.password=arxon2024

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: arxon-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
