name: Build Android AAB

on:
  workflow_dispatch:  # Run manually from GitHub Actions tab
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'android/**'
      - 'package.json'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build web app
      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      # 5. Setup Java
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 6. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 7. Install Capacitor CLI and sync
      - name: Sync Capacitor
        run: |
          npx cap sync android

      # 8. Decode keystore from secret
      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/arxon-release.keystore

      # 9. Build release AAB
      - name: Build release AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/arxon-release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # 10. Upload AAB as artifact (downloadable from GitHub)
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: arxon-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # 11. Show build success
      - name: Build complete
        run: |
          echo "✅ AAB built successfully!"
          echo "📦 Download from Actions tab → arxon-release-aab"
          ls -lh android/app/build/outputs/bundle/release/
